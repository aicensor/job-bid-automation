# =============================================================================
# WRITING GUIDE
# =============================================================================

writing_guide:
  formula: "Action Verb + What You Did + Tools/Technologies + Quantified Result"

  star_method:
    S: "Situation - brief context (optional in bullet, save for interviews)"
    T: "Task - the specific challenge or goal"
    A: "Action - what YOU did (not the team)"
    R: "Result - quantified outcome (percentage, dollar amount, time saved, users impacted)"

  top_action_verbs:
    architecture: [Architected, Designed, Engineered, Developed, Built]
    optimization: [Optimized, Reduced, Improved, Boosted, Accelerated]
    leadership: [Led, Mentored, Built, Scaled, Established, Spearheaded]
    automation: [Automated, Implemented, Deployed, Streamlined, Integrated]
    innovation: [Pioneered, Introduced, Launched, Created, Invented]
    analysis: [Analyzed, Identified, Evaluated, Diagnosed, Investigated]

  metric_types:
    performance: ["latency reduction (ms or %)", "throughput (requests/sec)", "P99/P95 response time", "page load time"]
    reliability: ["uptime (99.9%)", "crash-free rate", "MTTR reduction", "error rate reduction"]
    business: ["revenue impact ($)", "cost savings ($)", "user engagement (%)", "conversion rate (%)"]
    scale: ["users served (DAU/MAU)", "data volume (TB)", "transactions per second", "concurrent connections"]
    efficiency: ["deployment frequency", "release cycle time", "manual effort reduction (hours)", "test coverage (%)"]
    team: ["team size grown", "retention rate", "promotions achieved", "onboarding time reduction"]

  common_mistakes:
    - "Listing responsibilities instead of achievements"
    - "Missing quantified metrics entirely"
    - "Using passive voice (was responsible for) instead of active (Led, Built)"
    - "Failing to show YOUR specific contribution vs. team contribution"
    - "Not tailoring bullets to the target role's keywords"
    - "Including too many average bullets instead of fewer strong ones"

  ats_tips:
    - "Use standard section headings (Experience, Education, Skills)"
    - "Include exact technology names from the job description"
    - "Submit as PDF created from Word/Docs (not image-based PDF)"
    - "Avoid tables, columns, headers/footers, and graphics"
    - "Use standard fonts and 10-12pt size"
    - "Spell out acronyms at least once (e.g., CI/CD - Continuous Integration/Continuous Deployment)"
