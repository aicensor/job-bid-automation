# =============================================================================
# Senior Software Engineer Achievement Bank
# =============================================================================
# Curated from FAANG resumes, tech career coaches, recruiter insights, and
# top-performing resume examples (2025-2026).
#
# Formula: Action Verb + Task/Contribution + Tools/Skills + Quantified Result
#
# Usage: Select and customize bullets that match your actual experience.
#        Replace placeholders [X%, $Y, N] with your real metrics.
# =============================================================================

