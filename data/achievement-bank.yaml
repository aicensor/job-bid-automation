      - id: arch-002
        bullet: "Designed and implemented a serverless event-driven architecture using AWS Lambda, API Gateway, and DynamoDB, reducing operational costs by 40% and improving scalability for a user base of 5 million+."
        effectiveness:
          - "Names specific AWS services for ATS matching"
